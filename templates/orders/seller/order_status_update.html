{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Update Order Status{% endblock %}
{% block body %}
<h1 class="h4 mb-3">Order #{{ object.id }} — Status</h1>
<div class="card shadow-sm border rounded-4">
 <div class="card-body">
   <form method="post">
     {% csrf_token %}
     {{ form|crispy }}
     <button class="btn btn-dark w-100">Save</button>
   </form>
   <a class="btn btn-outline-secondary w-100 mt-2" href="{% url 'seller_order_items' %}">
     Back
   </a></div></div>
{% endblock %}
