{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Write review{% endblock %}
{% block body %}
<div class="container border rounded bg-light p-4 my-5">
    <h1 class="h5 mb-3">Review yozish</h1>
<div class="card shadow-sm border rounded-4">
 <div class="card-body">
   <div class="mb-2"><strong>Product:</strong> {{ view.product.name }}</div>
   <form method="post">
     {% csrf_token %}
     {{ form|crispy}}
     <button class="btn btn-dark w-100">Save</button>
   </form>
   <a class="btn btn-outline-secondary w-100 mt-2" href="{% url 'product_detail' view.product.slug %}">
     Back   </a> </div></div>
</div>
{% endblock %}
